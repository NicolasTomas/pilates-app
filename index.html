<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestión - Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height:100vh; display:flex; justify-content:center; align-items:center;
    }
    .container {
      background:white; border-radius:20px; padding:30px; width:90%; max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align:center; color:#667eea; margin-bottom:20px; }
    label { font-weight:600; color:#333; display:block; margin-top:15px; }
    input {
      width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:8px;
      margin-top:5px; font-size:14px;
    }
    input:focus { outline:none; border-color:#667eea; }
    button {
      width:100%; padding:12px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white; border:none; border-radius:10px; font-weight:600; margin-top:20px;
      cursor:pointer; transition:0.3s;
    }
    button:hover { transform:translateY(-2px); }
    #adminBtn {
      background:#17a2b8; margin-top:10px;
    }
    #adminModal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
      justify-content:center; align-items:center;
    }
    #adminModal .modal {
      background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; position:relative;
    }
    #closeAdminModal {
      position:absolute; top:10px; right:10px; border:none; background:none; font-size:18px; cursor:pointer;
    }
    .alert {
      display:none; margin-top:15px; padding:10px; border-radius:8px; text-align:center;
    }
    .alert-success { background:#d4edda; color:#155724; }
    .alert-error { background:#f8d7da; color:#721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏋️ Sistema de Gestión</h1>

    <div id="alert" class="alert"></div>

    <form id="dniLoginForm">
      <label for="dniLogin">Ingresá tu DNI</label>
      <input type="text" id="dniLogin" placeholder="Ej: 40258473" pattern="[0-9]+" maxlength="10" required>
      <button type="submit">Ingresar</button>
    </form>

    <button id="adminBtn">Acceso Administrador</button>
  </div>

  <!-- Modal administrador -->
  <div id="adminModal">
    <div class="modal">
      <button id="closeAdminModal">✖</button>
      <h2 style="text-align:center; color:#667eea;">Acceso Administrador</h2>
      <form id="adminLoginForm">
        <label for="adminEmailLogin">Correo electrónico</label>
        <input type="email" id="adminEmailLogin" placeholder="admin@ejemplo.com" required>
        <label for="adminPasswordLogin">Contraseña</label>
        <input type="password" id="adminPasswordLogin" placeholder="••••••••" required>
        <button type="submit">Iniciar Sesión</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./auth.js"></script>
</body>
</html>
